<!DOCTYPE html>
<html lang="en">

<head>
    <!--The site head sets the encoding to the UTF-8 standard,
    connects the CSS to the HTML document, the meta elements define how the HTML is being used, Title shows the title of the document.-->
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John's Personal Website</title>
</head>

<body>
    <!--The body of the document displays the main sections of the webpage-->

    <header>
        <!--The header section prominently displays my name at the top of the webpage-->
        <h1>John L Tymony</h1>
    </header>

    <nav>
        <!--The nav section displays the tabs for the Home, About, Projects, and Contact pages-->
        <a href="index.html">Home</a>
        <a href="about.html" class="active">About</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main>
        <section>
            <h2>About Me</h2>
            <p>This is where you can write a short bio about who you are, what you enjoy, and what you're learning.</p>
        </section>
    </main>


    <footer>
        <!--The footer section shows my copyright information-->
        <p>© 2026 John — All rights reserved.</p>
    </footer>

</body>

</html>
