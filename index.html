<!DOCTYPE html>
<html lang="en">
<head>
    <!--The site head sets the encoding to the UTF-8 standard,
    connect the CSS to the HTML document, the meta elements define how the html is being used, Title show's the title of the document.  -->
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John's Personal Website</title>
</head>
<body>
    <!--The body of the document is displaying the mains sections of the webpage-->

    <header>
        <!--The header sesction prominently displays my name at the top of the webpage-->
        <h1>John L Tymony</h1>
    </header>

    <nav>
        <!--The nav section is displaying the tabs to be used for the Home, About, Projecs and Contact pages-->
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main>
        <!--The main is showing the main section of the website where the content will reside-->
        <section>
            <h2>Welcome to My Website</h2>
            <p>This is where I introduce myself.</p>
        </section>
    </main>

    <footer>
        <!--The footer section is showing my copywrite information at the bottom of the page-->
        <p>© 2026 John — All rights reserved.</p>
    </footer>

</body>
</html>
